<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Password Generator -Easy Tutorials</title>
    <link rel="stylesheet" href="passwordgenerator.css" >
</head>
<body>
    <div class="container">
        <h1>Generate a <br> <span>Random Password</span></h1>
        <div class="display">
            <input type="text" id="Password" placeholder="Password">
            <img src="https://up.yimg.com/ib/th/id/OIP.gr89WSec3JHvGLQPyUlwxQHaHa?pid=Api&rs=1&c=1&qlt=95&w=121&h=121" onclick="copyPassword()">
        </div>
        <button onclick="create()">Generate password</button>
    </div>
    <script>
        const passwordBox=document.getElementById("Password")
        const length=12
        const lowercase="QWERTYUIOPLKJHGFDSAZXCVBNM"
        const upper="qwertyuioplkjhgfdsazxcvbnm"
        const num="1234567890"
        const symbol="!@#$%^&*()_+|}{'}/,."
         let allchars=lowercase+upper+num+symbol
        
        function create(){
            let password=""
        password+=upper[Math.floor(Math.random()*upper.length)]
        password+=lowercase[Math.floor(Math.random()*lowercase.length)]
        password+=num[Math.floor(Math.random()*num.length)]
        password+=symbol[Math.floor(Math.random()*symbol.length)]
        while(password.length<length){
            password+=allchars[Math.floor(Math.random()*allchars.length)]
        }
        passwordBox.value=password
    }
    function copyPassword(){
        passwordBox.select();
        document.execCommand("copy");
    }
    </script>
    
</body>
</html>
